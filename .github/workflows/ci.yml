name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  lint-app:
    name: Lint — Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npm run lint

  lint-and-test-server:
    name: Lint & Test — NestJS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Must run before lint and test — TypeScript can't resolve @prisma/client
      # types without a generated client, causing false-positive type errors.
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          # prisma.config.ts loads DATABASE_URL at generate time via dotenv.
          # A dummy value is sufficient — generate only reads the schema, not the DB.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  build-check-app:
    name: Build check — Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  build-check-server:
    name: Build check — NestJS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          # prisma.config.ts loads DATABASE_URL at generate time via dotenv.
          # A dummy value is sufficient — generate only reads the schema, not the DB.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Build
        run: npm run build

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform fmt -check -recursive
