name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

# ┌─────────────────────────────────────────────────────────────┐
# │  Pipeline shape                                             │
# │                                                             │
# │  PARALLEL (fast feedback)                                   │
# │  ├── lint-app                                               │
# │  ├── lint-and-test-server                                   │
# │  └── terraform-validate                                     │
# │           │                                                 │
# │           ▼  (all three must pass)                          │
# │  PARALLEL (build verification)                              │
# │  ├── build-app    (needs: lint-app)                         │
# │  └── build-server (needs: lint-and-test-server)             │
# └─────────────────────────────────────────────────────────────┘

jobs:
  # ── STAGE 1 — parallel quality gates ─────────────────────────────────────────

  lint-app:
    name: "[1] Lint — Next.js"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npm run lint

  lint-and-test-server:
    name: "[1] Lint & Test — NestJS"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # prisma.config.ts requires DATABASE_URL at load time; dummy value is fine
      # since generate only reads schema.prisma, never connects to the database.
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  terraform-validate:
    name: "[1] Terraform validate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform fmt -check -recursive

  # ── STAGE 2 — parallel build checks (run after quality gates pass) ───────────

  build-app:
    name: "[2] Build — Next.js"
    runs-on: ubuntu-latest
    needs: lint-app
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  build-server:
    name: "[2] Build — NestJS"
    runs-on: ubuntu-latest
    needs: lint-and-test-server
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Build
        run: npm run build
