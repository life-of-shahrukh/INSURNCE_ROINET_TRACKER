name: Deploy to AWS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

# id-token:write is REQUIRED for GitHub OIDC → AWS role assumption.
# Without this the JWT is never issued and configure-aws-credentials fails.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECS_CLUSTER: roinet-crm-prod
  ECS_SERVICE_APP: roinet-crm-prod-app
  ECS_SERVICE_SERVER: roinet-crm-prod-server

jobs:
  # ── 1. Terraform apply ──────────────────────────────────────────────────────
  terraform:
    name: Terraform apply
    runs-on: ubuntu-latest
    outputs:
      app_ecr_url:    ${{ steps.tf_output.outputs.app_ecr_url }}
      server_ecr_url: ${{ steps.tf_output.outputs.server_ecr_url }}
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-TF-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: |
          terraform plan \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="image_tag=${{ github.sha }}" \
            -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Capture ECR URLs
        id: tf_output
        run: |
          echo "app_ecr_url=$(terraform output -raw app_ecr_url)"       >> $GITHUB_OUTPUT
          echo "server_ecr_url=$(terraform output -raw server_ecr_url)" >> $GITHUB_OUTPUT

  # ── 2. Build & push Docker images ──────────────────────────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-Build-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ needs.terraform.outputs.app_ecr_url }}:${{ github.sha }}
            ${{ needs.terraform.outputs.app_ecr_url }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ needs.terraform.outputs.server_ecr_url }}:${{ github.sha }}
            ${{ needs.terraform.outputs.server_ecr_url }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Run Prisma migrations ────────────────────────────────────────────────
  migrate:
    name: Prisma migrate deploy
    runs-on: ubuntu-latest
    needs: [terraform, build-and-push]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-Migrate-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      # Run prisma migrate deploy as a one-off ECS task using the freshly built
      # server image. The task exits after migrations complete (exit 0) or fails
      # (exit non-zero), which we detect below before allowing the deploy to proceed.
      - name: Run migration task
        id: run_migration
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --task-definition "roinet-crm-prod-server" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[${{ secrets.ECS_SUBNET_ID }}],
              securityGroups=[${{ secrets.ECS_SECURITY_GROUP_ID }}],
              assignPublicIp=DISABLED
            }" \
            --overrides '{
              "containerOverrides": [{
                "name": "server",
                "command": ["npx", "prisma", "migrate", "deploy"],
                "environment": [
                  {"name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}"}
                ]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: $TASK_ARN"
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Wait for migration task to complete
        run: |
          echo "Waiting for task ${{ steps.run_migration.outputs.task_arn }} to stop..."
          aws ecs wait tasks-stopped \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "${{ steps.run_migration.outputs.task_arn }}"
          echo "Task stopped."

      - name: Assert migration succeeded
        run: |
          TASK_ARN="${{ steps.run_migration.outputs.task_arn }}"
          RESULT=$(aws ecs describe-tasks \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Migration container exit code: $RESULT"

          if [ "$RESULT" != "0" ]; then
            echo "❌ Prisma migration failed with exit code $RESULT"
            echo "--- CloudWatch Logs for task ---"
            # Print last 50 log lines to help diagnose the failure
            LOG_STREAM=$(aws ecs describe-tasks \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --tasks "$TASK_ARN" \
              --query 'tasks[0].containers[0].logStreamPrefix' \
              --output text 2>/dev/null || true)
            echo "Log stream hint: /ecs/roinet-crm-prod/server/$LOG_STREAM"
            exit 1
          fi

          echo "✅ Prisma migrations applied successfully."

  # ── 4. Deploy to ECS ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [migrate]
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-Deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new server deployment
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_SERVER }}" \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new app deployment
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_APP }}" \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for server service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_SERVER }}"

      - name: Wait for app service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_APP }}"

      - name: Deployment summary
        run: |
          echo "✅ Deployed commit ${{ github.sha }} to cluster ${{ env.ECS_CLUSTER }}"
          echo "   Server service: ${{ env.ECS_SERVICE_SERVER }}"
          echo "   App service:    ${{ env.ECS_SERVICE_APP }}"
