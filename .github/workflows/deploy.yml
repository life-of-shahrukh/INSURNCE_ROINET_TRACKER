name: Deploy to AWS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

# ┌──────────────────────────────────────────────────────────────┐
# │  Pipeline shape                                              │
# │                                                              │
# │  PARALLEL                                                    │
# │  ├── build-app-image    ──┐                                  │
# │  └── build-server-image ─┤                                  │
# │                           ▼  (both images pushed to ECR)    │
# │  SERIAL                                                      │
# │  └── migrate  (prisma migrate deploy — one-off ECS task)    │
# │           │                                                  │
# │           ▼  (migrations verified exit 0)                   │
# │  PARALLEL                                                    │
# │  ├── deploy-server ──┐                                       │
# │  └── deploy-app   ──┤                                        │
# │                      ▼  (both services stable)               │
# └──────────────────────────────────────────────────────────────┘

env:
  AWS_REGION: ap-south-1
  ECS_CLUSTER: roinet-crm-prod
  ECS_SERVICE_APP: roinet-crm-prod-app
  ECS_SERVICE_SERVER: roinet-crm-prod-server

jobs:
  # ── STAGE 1a — build app image (parallel) ─────────────────────────────────
  build-app-image:
    name: "[1] Build app image"
    runs-on: ubuntu-latest
    outputs:
      ecr_url: ${{ steps.ecr_url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-BuildApp-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR URL
        id: ecr_url
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "url=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/roinet-crm-app" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr_url.outputs.url }}:${{ github.sha }}
            ${{ steps.ecr_url.outputs.url }}:latest
          cache-from: type=gha,scope=app
          cache-to:   type=gha,scope=app,mode=max

  # ── STAGE 1b — build server image (parallel) ──────────────────────────────
  build-server-image:
    name: "[1] Build server image"
    runs-on: ubuntu-latest
    outputs:
      ecr_url: ${{ steps.ecr_url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-BuildServer-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR URL
        id: ecr_url
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "url=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/roinet-crm-server" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr_url.outputs.url }}:${{ github.sha }}
            ${{ steps.ecr_url.outputs.url }}:latest
          cache-from: type=gha,scope=server
          cache-to:   type=gha,scope=server,mode=max

  # ── STAGE 2 — run migrations (serial — must complete before deploy) ────────
  migrate:
    name: "[2] Prisma migrate deploy"
    runs-on: ubuntu-latest
    needs: [build-app-image, build-server-image]
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-Migrate-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Launch migration task
        id: migration
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --task-definition "roinet-crm-prod-server" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[${{ secrets.ECS_SUBNET_ID }}],
              securityGroups=[${{ secrets.ECS_SECURITY_GROUP_ID }}],
              assignPublicIp=ENABLED
            }" \
            --overrides '{
              "containerOverrides": [{
                "name": "server",
                "command": ["npx", "prisma", "migrate", "deploy"]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
          echo "Migration task: $TASK_ARN"

      - name: Wait for migration to finish
        run: |
          aws ecs wait tasks-stopped \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "${{ steps.migration.outputs.task_arn }}"

      - name: Assert exit code 0
        run: |
          CODE=$(aws ecs describe-tasks \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "${{ steps.migration.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          echo "Exit code: $CODE"
          if [ "$CODE" != "0" ]; then
            echo "❌ Migration failed — check CloudWatch: /ecs/roinet-crm-prod/server"
            exit 1
          fi
          echo "✅ Migrations applied"

  # ── STAGE 3a — deploy server service (parallel) ───────────────────────────
  deploy-server:
    name: "[3] Deploy server"
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-DeployServer-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_SERVER }}" \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_SERVER }}"
          echo "✅ Server stable"

  # ── STAGE 3b — deploy app service (parallel) ──────────────────────────────
  deploy-app:
    name: "[3] Deploy app"
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-DeployApp-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_APP }}" \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_APP }}"
          echo "✅ App stable"
