name: Deploy to AWS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

# id-token:write is required for GitHub OIDC → AWS role assumption (no static keys)
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECS_CLUSTER: roinet-crm-prod
  ECS_SERVICE_APP: roinet-crm-prod-app
  ECS_SERVICE_SERVER: roinet-crm-prod-server

jobs:
  # ── 1. Build & push Docker images ──────────────────────────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      app_ecr_url:    ${{ steps.ecr_urls.outputs.app_ecr_url }}
      server_ecr_url: ${{ steps.ecr_urls.outputs.server_ecr_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-Build-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR URLs
        id: ecr_urls
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION=${{ env.AWS_REGION }}
          echo "app_ecr_url=${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/roinet-crm-app"       >> $GITHUB_OUTPUT
          echo "server_ecr_url=${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/roinet-crm-server" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr_urls.outputs.app_ecr_url }}:${{ github.sha }}
            ${{ steps.ecr_urls.outputs.app_ecr_url }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr_urls.outputs.server_ecr_url }}:${{ github.sha }}
            ${{ steps.ecr_urls.outputs.server_ecr_url }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 2. Run Prisma migrations (before rolling out new tasks) ────────────────
  migrate:
    name: Prisma migrate deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-Migrate-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      # Run prisma migrate deploy as a one-off ECS task using the new server image.
      # The task exits with code 0 on success, non-zero on failure.
      - name: Launch migration task
        id: run_migration
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --task-definition "roinet-crm-prod-server" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[${{ secrets.ECS_SUBNET_ID }}],
              securityGroups=[${{ secrets.ECS_SECURITY_GROUP_ID }}],
              assignPublicIp=DISABLED
            }" \
            --overrides '{
              "containerOverrides": [{
                "name": "server",
                "command": ["npx", "prisma", "migrate", "deploy"],
                "environment": [
                  {"name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}"}
                ]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
          echo "Migration task launched: $TASK_ARN"

      - name: Wait for migration task to stop
        run: |
          aws ecs wait tasks-stopped \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "${{ steps.run_migration.outputs.task_arn }}"

      - name: Assert migration exit code is 0
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "${{ steps.run_migration.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Migration exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ Prisma migration failed (exit $EXIT_CODE)"
            echo "Check CloudWatch: /ecs/roinet-crm-prod/server"
            exit 1
          fi

          echo "✅ Migrations applied successfully"

  # ── 3. Deploy new images to ECS ────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubActions-Deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new server deployment
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_SERVER }}" \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new app deployment
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_APP }}" \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for server to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_SERVER }}"

      - name: Wait for app to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_APP }}"

      - name: Summary
        run: |
          echo "✅ Deployed ${{ github.sha }} to ${{ env.ECS_CLUSTER }}"
