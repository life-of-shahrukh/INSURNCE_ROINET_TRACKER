server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Roinet API: all logs (info + above) ────────────────────────────────────
  - job_name: roinet-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: roinet-api
          app: roinet-crm
          env: production
          __path__: /var/log/roinet/app-*.log

    pipeline_stages:
      # Parse each line as JSON (Winston structured output)
      - json:
          expressions:
            level:      level
            message:    message
            context:    context
            timestamp:  timestamp
            method:     method
            statusCode: statusCode
            slow:       slow
            security:   security

      # Promote key fields as Loki labels for efficient filtering
      - labels:
          level:
          context:
          method:
          statusCode:

      # slow label
      - template:
          source: slow
          template: '{{ if eq .Value "true" }}true{{ else }}false{{ end }}'
      - labels:
          slow:

      # security label (401/403 events)
      - template:
          source: security
          template: '{{ if eq .Value "true" }}true{{ else }}false{{ end }}'
      - labels:
          security:

      # Use the log timestamp, not ingestion time
      - timestamp:
          source: timestamp
          format: RFC3339

      # Keep the FULL raw JSON line as the log content (not just message)
      # This lets Grafana Explore show all fields in the log panel

  # ── Roinet API: error-only log file ────────────────────────────────────────
  - job_name: roinet-api-errors
    static_configs:
      - targets:
          - localhost
        labels:
          job: roinet-api-errors
          app: roinet-crm
          env: production
          level: error
          __path__: /var/log/roinet/error-*.log

    pipeline_stages:
      - json:
          expressions:
            level:     level
            message:   message
            context:   context
            timestamp: timestamp
      - labels:
          level:
          context:
      - timestamp:
          source: timestamp
          format: RFC3339

  # ── OS-level syslog (OOM, disk full, system errors) ──────────────────────
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          app: host
          env: production
          __path__: /var/log/host/messages

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<host>\S+)\s+(?P<process>[^:]+):\s+(?P<message>.+)$'
      - labels:
          host:
          process:
